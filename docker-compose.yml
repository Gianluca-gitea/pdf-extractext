services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - APP_NAME=PDF Extractext API
      - APP_VERSION=0.1.0
      - APP_MAX_PDF_SIZE_BYTES=5242880
      - MONGODB_URI=mongodb://mongodb:27017
      - MONGODB_DB_NAME=pdf-extractext
    volumes:
      - ./app:/app/app
    depends_on:
      - mongodb
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  mongodb:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped

volumes:
  mongodb_data: