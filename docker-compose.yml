services:
  api:
    image: pdf-extractext-api:0.1.0
    build: .
    ports:
      - "8000:8000"
    environment:
      - APP_NAME=PDF Extractext API
      - APP_VERSION=0.1.0
      - APP_MAX_PDF_SIZE_BYTES=5242880
      - MONGODB_URI=mongodb://mongodb:27017
      - MONGODB_DB_NAME=pdf-extractext
    depends_on:
      mongodb:
        condition: service_healthy

  mongodb:
    image: mongo:8.0.4
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  mongodb_data: